<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="coverctl">
  <title>coverctl</title>

  <!-- Square mark — confident, geometric, scales clean from 16px to hero.
       Concept: a thick rounded-square frame (the policy gate) with a
       glyph inside that reads as both a 'c' and a checkmark, plus a
       small accent dot suggesting "the moment the agent is anchored." -->

  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Outer frame: rounded square, generous corner radius, thick stroke.
       This is the gate / boundary — the policy lives inside it. -->
  <rect x="10" y="10" width="100" height="100" rx="22"
        fill="none"
        stroke="url(#markGrad)"
        stroke-width="9"/>

  <!-- Inner glyph: stylized 'c' that doubles as a checkmark.
       Two strokes joined at a sharp angle, opening to the right —
       reads as the letter 'c' from a distance and as a check beat
       up close. -->
  <path d="M 80 38
           L 50 38
           L 50 82
           L 80 82"
        fill="none"
        stroke="url(#markGrad)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Anchor dot — the still point at the centre of the loop.
       Small, off-axis, distinctive. Sits where the 'c' opens. -->
  <circle cx="84" cy="60" r="5"
          fill="url(#markGrad)"/>
</svg>
